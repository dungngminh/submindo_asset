name: Crawl promo deals

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: promo-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Snapshot current promos
        run: git show HEAD:promos.json > "$RUNNER_TEMP/promos-before.json"
      - run: npm run crawl
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - name: Notify new promo deals
        if: ${{ !cancelled() && !failure() }}
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if git diff --quiet -- promos.json; then
            echo "No promo changes"
            exit 0
          fi
          node promo/src/notify.mjs \
            --before "$RUNNER_TEMP/promos-before.json" \
            --after promos.json \
            --types type.json
      - name: Commit promo changes to master
        if: ${{ !cancelled() && !failure() }}
        run: |
          if git diff --quiet -- promos.json; then
            echo "No promo changes"
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add promos.json
          git commit -m "chore: update promo deals"
          git push origin HEAD:master
