name: Crawl promo deals

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: promo-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run crawl
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - name: Create or update review PR
        if: ${{ !cancelled() && !failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- promos.json; then
            echo "No promo changes"
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git switch -C automation/promo-deals
          git add promos.json
          git commit -m "chore: update promo deals"
          git push --force origin automation/promo-deals
          existing=$(gh pr list --head automation/promo-deals --base master --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --title "chore: update promo deals" --body "Automated RSS/Gemini refresh. Please review before merging."
          else
            gh pr create --base master --head automation/promo-deals --title "chore: update promo deals" --body "Automated RSS/Gemini refresh. Please review before merging."
          fi
